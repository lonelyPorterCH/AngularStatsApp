@if (stat()) {
<h2>{{ stat()!.title }}</h2>
<div class="chart-container">
  <app-chart [stat]="stat()!"></app-chart>
</div>
<button [routerLink]="['/stats']" matButton="outlined">Back</button>
<button [routerLink]="['/stats', stat()!.id, 'edit']" mat-flat-button>
  <mat-icon>edit</mat-icon>
  Edit
</button>
<button (click)="onDelete()" mat-flat-button>
  <mat-icon>delete</mat-icon>
  Delete
</button>
} @else if (notFound()) {
<p>Statistic not found.</p>
} @else {
<p>Loading...</p>
}
