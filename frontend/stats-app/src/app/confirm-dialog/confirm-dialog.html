<h2 mat-dialog-title>Confirm Delete</h2>
<mat-dialog-content>
  Are you sure you want to delete this stat or datapoint?
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button [mat-dialog-close]="false" mat-button>Cancel</button>
  <button [mat-dialog-close]="true" mat-flat-button>Delete</button>
</mat-dialog-actions>
