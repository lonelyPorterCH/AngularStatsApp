<form (ngSubmit)="onIncrease()" [formGroup]="increaseForm">
  <mat-form-field appearance="outline">
    <mat-label>Date</mat-label>
    <input [matDatepicker]="increasePicker" formControlName="x" matInput/>
    <mat-datepicker-toggle [for]="increasePicker" matIconSuffix></mat-datepicker-toggle>
    <mat-datepicker #increasePicker></mat-datepicker>
    @if (increaseForm.get('x')?.errors?.['required']) {
      <mat-error>Date is required</mat-error>
    }
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Amount to add</mat-label>
    <input formControlName="amount" matInput type="number"/>
    @if (increaseForm.get('amount')?.errors?.['required']) {
      <mat-error>Amount is required</mat-error>
    }
  </mat-form-field>

  <button mat-flat-button type="submit">
    <mat-icon>trending_up</mat-icon>
    Increase
  </button>
</form>
