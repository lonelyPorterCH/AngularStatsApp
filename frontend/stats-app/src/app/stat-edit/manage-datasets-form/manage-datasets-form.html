<div class="datasets-container">

  <!-- Axis rename section -->
  <h3>Rename Axes</h3>
  <form (ngSubmit)="onRenameAxes()" [formGroup]="axesForm" class="axes-form">
    <mat-form-field appearance="outline">
      <mat-label>X-Axis Name</mat-label>
      <input formControlName="xAxisName" matInput/>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Y-Axis Name</mat-label>
      <input formControlName="yAxisName" matInput/>
    </mat-form-field>
    <button mat-flat-button type="submit" [disabled]="axesForm.invalid || axesForm.pristine">
      <mat-icon>save</mat-icon>
      Save Axes
    </button>
  </form>

  <!-- Dataset list -->
  <h3>Datasets</h3>
  <mat-list>
    @for (ds of sortedDatasets; track ds.label) {
      <mat-list-item>
        @if (editingDataset[ds.label] !== undefined) {
          <input
            [(ngModel)]="editingDataset[ds.label]"
            [ngModelOptions]="{standalone: true}"
            matInput
            class="rename-input"
            (keyup.enter)="onRenameDataset(ds.label)"
            (keyup.escape)="cancelRenameDataset(ds.label)"
          />
          <button mat-icon-button (click)="onRenameDataset(ds.label)" aria-label="Confirm rename">
            <mat-icon>check</mat-icon>
          </button>
          <button mat-icon-button (click)="cancelRenameDataset(ds.label)" aria-label="Cancel rename">
            <mat-icon>close</mat-icon>
          </button>
        } @else {
          <div class="dataset-row">
            <div class="dataset-label-section">
              <span>{{ ds.label }}</span>
              <mat-checkbox
                [ngModel]="ds.filled ?? false"
                [ngModelOptions]="{standalone: true}"
                (ngModelChange)="onSetDatasetFilled(ds.label, $event)"
              >
                Filled
              </mat-checkbox>
            </div>
            <div class="dataset-actions">
              <button mat-icon-button (click)="moveDatasetUp(ds.label)" aria-label="Move dataset up"
                      [disabled]="sortedDatasets.indexOf(ds) === 0">
                <mat-icon>arrow_upward</mat-icon>
              </button>
              <button mat-icon-button (click)="moveDatasetDown(ds.label)" aria-label="Move dataset down"
                      [disabled]="sortedDatasets.indexOf(ds) === sortedDatasets.length - 1">
                <mat-icon>arrow_downward</mat-icon>
              </button>
              <button mat-icon-button (click)="startRenameDataset(ds.label)" aria-label="Rename dataset">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button (click)="onDeleteDataset(ds.label)" aria-label="Delete dataset">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>
        }
      </mat-list-item>
    } @empty {
      <mat-list-item>No datasets yet.</mat-list-item>
    }
  </mat-list>

  <!-- Add dataset form -->
  <form (ngSubmit)="onAddDataset()" [formGroup]="addDatasetForm" class="add-dataset-form">
    <mat-form-field appearance="outline">
      <mat-label>New Dataset Label</mat-label>
      <input formControlName="label" matInput/>
    </mat-form-field>
    <button mat-flat-button type="submit" [disabled]="addDatasetForm.invalid">
      <mat-icon>add</mat-icon>
      Add Dataset
    </button>
  </form>
</div>
