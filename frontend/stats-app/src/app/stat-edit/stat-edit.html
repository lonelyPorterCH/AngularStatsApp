@if (stat()) {
  <h2>Edit - {{ stat()!.title }}</h2>

  <div class="chart-container">
    <app-chart [stat]="stat()!" (pointClick)="onChartPointClick($event)"></app-chart>
  </div>

  <mat-tab-group #tabGroup>
    <mat-tab label="Manage Datasets">
      <app-manage-datasets-form (datasetsChanged)="reloadStat()" [stat]="stat()!"></app-manage-datasets-form>
    </mat-tab>

    <mat-tab label="Add Data Point">
      <app-add-point-form (pointChanged)="reloadStat()" [stat]="stat()!"></app-add-point-form>
    </mat-tab>

    <mat-tab label="Edit / Delete Point">
      <app-edit-delete-form #editDeleteForm (pointChanged)="reloadStat()" [stat]="stat()!"></app-edit-delete-form>
    </mat-tab>
  </mat-tab-group>
} @else {
  <p>Loading...</p>
}
